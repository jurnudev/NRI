<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRJ IoT Dashboard</title>
<link rel="icon" type="image/png" href="https://jurnudev.github.io/my-assets/logo.png">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ===== RESET & BASE ===== */
* {
box-sizing: border-box; /* ความกว้างรวม padding แล้ว */
margin: 0;
padding: 0;
}
body {
background-color: #0f172a;
color: #e2e8f0;
font-family: 'Segoe UI', Tahoma, sans-serif;
font-size: 16px;
min-height: 100vh;
}
/* ===== CSS VARIABLES (สีและขนาด) ===== */
:root {
--color-bg: #0f172a; /* พื้นหลังหน้า */
--color-card: #1e293b; /* พื้นหลัง Card */
--color-header: #1e293b; /* พื้นหลัง Header */
--color-accent: #00b4d8; /* สีเน้นหลัก */
--color-text: #e2e8f0; /* สีตัวอักษร */
--color-muted: #94a3b8; /* สีตัวอักษรรอง */
--radius: 12px; /* ความโค้งมุม */
--gap: 16px; /* ระยะห่าง */
}
/* ===== HEADER ===== */
.header {
display: flex;
justify-content: space-between; /* ซ้าย-ขวา */
align-items: center; /* กึ่งกลางแนวตั้ง */
padding: 12px 24px;
background: var(--color-header);
border-bottom: 2px solid var(--color-accent);
position: sticky; /* ค้างบนหน้าจอเมื่อ Scroll */
top: 0;
z-index: 100;
}
.logo { font-size: 20px; font-weight: bold; color: var(--color-accent); }
#clock { color: var(--color-muted); font-size: 14px; margin-right: 12px; }
/* ===== BADGE (สถานะ MQTT) ===== */
.badge {
padding: 3px 10px;
border-radius: 10px;
font-size: 12px;
font-weight: bold;
}
.badge-ok { background: #14532d; color: #86efac; }
.badge-error { background: #4c0519; color: #fca5a5; }
/* ===== LAYOUT: SIDEBAR + CONTENT ===== */
.layout {
display: flex;
min-height: calc(100vh - 54px);
}
.sidebar {
width: 220px;
background: var(--color-card);
padding: 16px;
border-right: 1px solid #334155;
flex-shrink: 0; /* ไม่ให้sidebar ย่อเมื่อพื้นที่แคบ */
}
.sidebar h3 { color: var(--color-accent); margin-bottom: 16px; font-size: 14px; }
.content { flex: 1; padding: 20px; }
/* ===== WIDGET CARDS ===== */
.cards-row {
display: flex;
flex-wrap: wrap; /* ตัดบรรทัดอัตโนมัติ*/
gap: var(--gap);
margin-bottom: 20px;
}
.card {
flex: 1 1 160px; /* ขยายได้, ย่อได้, ขนาดเริ่มต้น 160px */
max-width: 220px;
padding: 16px;
background: var(--color-card);
border-radius: var(--radius);
border-left: 4px solid var(--color-accent);
transition: border-color 0.3s; /* เปลี่ยนสีแบบ Smooth */
}
.card-label { font-size: 12px; color: var(--color-muted); margin-bottom: 6px; }
.card-value { font-size: 36px; font-weight: bold; color: var(--color-accent); }
.card-unit { font-size: 12px; color: var(--color-muted); }
.card-time { font-size: 11px; color: var(--color-muted); margin-top: 4px; }
/* ===== PROGRESS BAR ===== */
.progress-bg {
background: #334155;
border-radius: 4px;
height: 8px;
margin-top: 8px;
overflow: hidden;
}
.progress-bar {
height: 8px;
border-radius: 4px;
background: var(--color-accent);
width: 0%;
transition: width 0.3s ease;
}
/* ===== CHART CARD ===== */
.chart-card {
background: var(--color-card);
border-radius: var(--radius);
padding: 20px;
border-left: 4px solid var(--color-accent);
}
/* ===== RESPONSIVE ===== */
/* หน้าจอปานกลาง (Tablet < 1024px) */
@media (max-width: 1024px) {
.sidebar { width: 180px; }
.card { max-width: 200px; }
}
/* หน้าจอเล็ก (Mobile < 768px) */
@media (max-width: 768px) {
.layout { flex-direction: column; } /* วางซ้อนกัน */
.sidebar { width: 100%; border-right: none;
border-bottom: 1px solid #334155; }
.card { max-width: 100%; flex: 1 1 140px; }
.header { padding: 8px 12px; }
.logo { font-size: 16px; }
.card-value { font-size: 28px; }
}
/* หน้าจอเล็กมาก (< 480px) */
@media (max-width: 480px) {
.cards-row { gap: 8px; }
.card { padding: 12px; }
}
/* ===== CONTROL BUTTONS ===== */
.ctrl-btn {
width: 100%;
padding: 7px 0;
margin-bottom: 6px;
background: #334155;
color: white;
border: none;
border-radius: 6px;
font-size: 13px;
cursor: pointer;
transition: background 0.15s;
}
.ctrl-btn:active { background: #00b4d8; }
.ctrl-btn.led-on { background: #ca8a04; }
/* ===== D-PAD ===== */
.dpad {
display: grid;
grid-template-columns: repeat(3, 52px);
grid-template-rows: repeat(3, 52px);
gap: 4px;
width: 164px;
margin: 0 auto;
}
.dpad-btn {
width: 52px; height: 52px;
background: #334155; color: white;
border: none; border-radius: 8px;
font-size: 18px; cursor: pointer;
transition: background 0.1s;
user-select: none;
}
.dpad-btn:active { background: #00b4d8; }
.dpad-btn.stop { background: #7f1d1d; font-size: 22px; }
</style>
</head>
<body>
<!-- ===== HEADER ===== -->
<header class="header">
<div class="header-left">
<span class="logo"><img src="https://jurnudev.github.io/my-assets/logo.png" style="height:24px; margin-right:8px; vertical-align:middle;"> NRJ IoT Dashboard</span>

</div>
<div class="header-right">
<span id="clock">00:00:00</span>
<span id="mqttBadge" class="badge badge-error">Offline</span>
</div>
</header>
<!-- ===== LAYOUT: SIDEBAR + CONTENT ===== -->
<div class="layout">
<!-- SIDEBAR: ควบคุม ESP32 -->
<aside class="sidebar">
<h3>ควบคุม ESP32</h3>
<div id="controlPanel">
<!-- LED Toggles -->
<div style="margin-bottom:16px">
<p style="font-size:12px; color:#94a3b8; margin-bottom:8px">LED Control</p>
<button class="ctrl-btn" id="btnA" onclick="toggleLED('A')">LED A OFF</button>
<button class="ctrl-btn" id="btnB" onclick="toggleLED('B')">LED B OFF</button>
<button class="ctrl-btn" id="btnC" onclick="toggleLED('C')">LED C OFF</button>
</div>
<!-- D-Pad -->
<p style="font-size:12px; color:#94a3b8; margin-bottom:8px">ควบคุมมอเตอร์</p>
<div class="dpad">
<div></div>
<button class="dpad-btn" onmousedown="sendCommand('F')" onmouseup="sendCommand('S')">&#9650;</button>
<div></div>
<button class="dpad-btn" onmousedown="sendCommand('L')" onmouseup="sendCommand('S')">&#9664;</button>
<button class="dpad-btn stop" onclick="sendCommand('S')">&#9646;</button>
<button class="dpad-btn" onmousedown="sendCommand('R')" onmouseup="sendCommand('S')">&#9654;</button>
<div></div>
<button class="dpad-btn" onmousedown="sendCommand('B')" onmouseup="sendCommand('S')">&#9660;</button>
<div></div>
</div>
<!-- Servo -->
<p style="font-size:12px; color:#94a3b8; margin:12px 0 6px">Servo</p>
<div style="display:flex; gap:4px">
<button class="ctrl-btn" onclick="sendCommand('sv=0')">0°</button>
<button class="ctrl-btn" onclick="sendCommand('sv=90')">90°</button>
<button class="ctrl-btn" onclick="sendCommand('sv=180')">180°</button>
</div>
</div>
</aside>
<!-- CONTENT: Cards + Chart -->
<main class="content">
<!-- Widget Cards -->
<div class="cards-row">
<div class="card" id="tempCard">
<div class="card-label">อุณหภูมิ(Temp)</div>
<div class="card-value" id="tempValue">--</div>
<div class="card-unit">°C</div>
<div class="card-time" id="tempTime"></div>
</div>
<div class="card" id="humidCard">
<div class="card-label">ความชื้น (Humid)</div>
<div class="card-value" id="humidValue">--</div>
<div class="card-unit">%</div><div class="card-time" id="humidTime"></div>
</div>
<div class="card" id="sensorCard">
<div class="card-label">Sensor1</div>
<div class="card-value" id="sensorValue">--</div>
<div class="progress-bg">
<div class="progress-bar" id="sensorBar"></div>
</div>
</div>
<div class="card" id="statusCard">
<div class="card-label">สถานะการเชื่อมต่อ</div>
<div class="card-value" id="statusValue" style="font-size:18px">--</div>
<div class="card-time" id="msgCount">รับข้อมูล: 0 ครั้ง</div>
</div>
<!-- Humid Gauge -->
<div class="card">
<div class="card-label">Humid Gauge</div>
<div style="position:relative; width:100px; height:50px; margin:8px auto">
<div id="humidGauge" style="
width:100px; height:50px;
border-radius: 50px 50px 0 0;
background: conic-gradient(#3b82f6 var(--gpct, 0%), #334155 0%);">
</div>
<div id="humidGaugeVal" style="
position:absolute; bottom:2px; width:100%;
text-align:center; color:white;
font-size:16px; font-weight:bold">
--%
</div>
</div>
</div>
</div><!-- end cards-row -->
<!-- Chart Area -->
<div class="chart-card">
<div class="card-label">กราฟอุณหภูมิและความชื้น (Real-time)</div>
<canvas id="sensorChart" height="120"></canvas>
</div>
</main>
</div>

<script>
// ===== mqtt.config.js =====
// รวม Config ทั้งหมดไว้ที่นี่
// เมื่อต้องการเปลี่ยน Broker แก้ไขที่ไฟล์นี้เพียงไฟล์เดียว
const MQTT_CONFIG = {
// --- Broker ---
brokerURL: 'wss://rail.kls.ac.th:9002/mqtt',

clientId: 'dashboard_' + Math.random().toString(16).substr(2, 8),
clean: true,
reconnectPeriod: 3000, // ms ก่อนเชื่อมใหม่
connectTimeout: 10000, // ms timeout
// --- Topics ที่ Subscribe (รับข้อมูล) ---
topics: {
temp: 'Temp',
humid: 'Humid',
sensor: 'Sensor1',
},
// --- Topic ที่ Publish (ส่งค าสั ่ง) ---
cmdTopic: 'test/topic',
};

// ===== chart.setup.js =====
// ข้อมูลส าหรับกราฟ
const MAX_POINTS = 20; // แสดงล่าสุด 20 จุด
const chartLabels = []; // เวลา
const tempData = []; // ค่า Temp
const humidData = []; // ค่า Humid

// สร้าง Chart
const ctx = document.getElementById('sensorChart').getContext('2d');
const sensorChart = new Chart(ctx, {
type: 'line',
data: {
labels: chartLabels,
datasets: [
{
label: 'อุณหภูมิ(°C)',
data: tempData,
borderColor: '#ef4444',
backgroundColor: 'rgba(239,68,68,0.15)',
tension: 0.3,
fill: true,
pointRadius: 3,
},
{
label: 'ความชื้น (%)',
data: humidData,
borderColor: '#3b82f6',
backgroundColor: 'rgba(59,130,246,0.15)',
tension: 0.3,
fill: true,
pointRadius: 3,
}
]
},
options: {
animation: { duration: 300 },
responsive: true,
scales: {
x: { ticks: { color: '#94a3b8', maxTicksLimit: 10 } },
y: { ticks: { color: '#94a3b8' }, min: 0, max: 100 }
},
plugins: {
legend: { labels: { color: '#e2e8f0' } }
}
}
});

// ===== ฟังก์ชัน addChartPoint =====
// เรียกจาก app.js เมื่อรับค่า Temp หรือ Humid ใหม่
function addChartPoint(type, value) {
let time = new Date().toLocaleTimeString('th-TH', {
hour:'2-digit', minute:'2-digit', second:'2-digit'
});
if (type === 'temp') {
// เพิ่ม Label เฉพาะตอน Temp มา (ป้องกันซ ้า)
chartLabels.push(time);
tempData.push(value);
// เติม Humid ด้วย null ถ้าไม่มีค่า
if (humidData.length < chartLabels.length)
humidData.push(null);
} else if (type === 'humid') {
humidData.push(value);
if (tempData.length < chartLabels.length)
tempData.push(null);
}
// Sliding Window: ลบข้อมูลเก่าเมื่อเกิน MAX_POINTS
if (chartLabels.length > MAX_POINTS) {
chartLabels.shift();
tempData.shift();
humidData.shift();
}
sensorChart.update(); // วาดใหม่
}

// ===== app.js =====
// ตัวแปรสถานะ
let msgCount = 0; // จ านวนข้อมูลที่รับมาแล้ว
let lastTemp = null; // ค่าอุณหภูมิล่าสุด
let lastHumid = null; // ค่าความชื้นล่าสุด

// ===== ฟังก์ชันตัวช่วย =====
// แปลงค่า Sensor (0-4095) เป็น % (0-100)
function sensorToPercent(value) {
return ((value / 4095) * 100).toFixed(1);
}

// ดึงเวลาปัจจุบันเป็น String
function nowTime() {
return new Date().toLocaleTimeString('th-TH');
}

// แปลง JSON String → Object (พร้อม error handling)
function parseJSON(str) {
try { return JSON.parse(str); }
catch(e) { return null; }
}

// ===== อัปเดตนาฬิกา =====
setInterval(function() {
document.getElementById('clock').textContent = nowTime();
}, 1000);

// ===== ฟังก์ชันอัปเดต Widget Card =====
function updateTemp(value) {
let num = parseFloat(value);
document.getElementById('tempValue').textContent = num.toFixed(1);
document.getElementById('tempTime').textContent = 'อัปเดต: ' + nowTime();
// เปลี่ยนสีCard ตามอุณหภูมิ
let card = document.getElementById('tempCard');
if (num > 35) card.style.borderLeftColor = '#ef4444'; // แดง
else if (num > 30) card.style.borderLeftColor = '#f59e0b'; // ส้ม
else card.style.borderLeftColor = '#22c55e'; // เขียว
lastTemp = num;
addChartPoint('temp', num); // ส่งให้chart.setup.js
}

function updateHumid(value) {
let num = parseFloat(value);
document.getElementById('humidValue').textContent = num.toFixed(1);
document.getElementById('humidTime').textContent = 'อัปเดต: ' + nowTime();
lastHumid = num;
addChartPoint('humid', num);
// อัปเดต Gauge
let pct = Math.min(100, num).toFixed(0) + '%';
document.getElementById('humidGauge').style.setProperty('--gpct', pct);
document.getElementById('humidGaugeVal').textContent = num.toFixed(0) + '%';
}

function updateSensor(value) {
let num = parseInt(value);
let pct = sensorToPercent(num);
document.getElementById('sensorValue').textContent = num;
// Progress Bar
let bar = document.getElementById('sensorBar');
bar.style.width = pct + '%';
// เปลี่ยนสีBar ตามระดับ
if (pct > 75) bar.style.background = '#ef4444'; // แดง
else if (pct > 25) bar.style.background = '#f59e0b'; // เหลือง
else bar.style.background = '#22c55e'; // เขียว
}

function updateStatus(connected) {
let badge = document.getElementById('mqttBadge');
let statusEl = document.getElementById('statusValue');
let card = document.getElementById('statusCard');
if (connected) {
badge.textContent = 'Online';
badge.className = 'badge badge-ok';
statusEl.textContent = 'Connected';
card.style.borderLeftColor = '#22c55e';
} else {
badge.textContent = 'Offline';
badge.className = 'badge badge-error';
statusEl.textContent = 'Disconnected';
card.style.borderLeftColor = '#ef4444';
}
}

function incrementCount() {
msgCount++;
document.getElementById('msgCount').textContent = 'รับข้อมูล: ' + msgCount + ' ครั้ง';
}

// ===== app.js (ต่อ) — ส่วน MQTT =====
// สร้าง MQTT Client จาก Config
const client = mqtt.connect(MQTT_CONFIG.brokerURL, {
clientId: MQTT_CONFIG.clientId,
clean: MQTT_CONFIG.clean,
reconnectPeriod: MQTT_CONFIG.reconnectPeriod,
connectTimeout: MQTT_CONFIG.connectTimeout,
});

// Event: เชื่อมต่อส าเร็จ
client.on('connect', function() {
console.log('[MQTT] Connected:', MQTT_CONFIG.clientId);
updateStatus(true);
// Subscribe ทุก Topic ที่ก าหนดใน Config
Object.values(MQTT_CONFIG.topics).forEach(function(topic) {
client.subscribe(topic);
console.log('[MQTT] Subscribed:', topic);
});
});

// Event: รับข้อความ
client.on('message', function(topic, message) {
let payload = message.toString();
incrementCount();
// เลือกฟังก์ชันตาม Topic
if (topic === MQTT_CONFIG.topics.temp) updateTemp(payload);
if (topic === MQTT_CONFIG.topics.humid) updateHumid(payload);
if (topic === MQTT_CONFIG.topics.sensor) updateSensor(payload);
});

// Event: เกิด Error
client.on('error', function(err) {
console.error('[MQTT] Error:', err);
updateStatus(false);
});

// Event: หลุดการเชื่อมต่อ
client.on('close', function() {
console.log('[MQTT] Disconnected');
updateStatus(false);
});

// ===== ฟังก์ชันส่งค าสั ่ง =====
function sendCommand(cmd) {
if (client.connected) {
client.publish(MQTT_CONFIG.cmdTopic, cmd);
console.log('[MQTT] Sent:', cmd);
} else {
console.warn('[MQTT] Not connected!');
}
}

// ===== LED Toggle =====
const ledState = { A: false, B: false, C: false };
function toggleLED(name) {
ledState[name] = !ledState[name];
let cmd = name + (ledState[name] ? 'ON' : 'OFF');
sendCommand(cmd);
let btn = document.getElementById('btn' + name);
if (ledState[name]) {
btn.textContent = 'LED ' + name + ' ON';
btn.classList.add('led-on');
} else {
btn.textContent = 'LED ' + name + ' OFF';
btn.classList.remove('led-on');
}
}
</script>
</body>
</html>
